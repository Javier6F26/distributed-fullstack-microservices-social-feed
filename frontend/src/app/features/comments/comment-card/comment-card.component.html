<div class="comment-card" [class.pending]="comment.pending">
  <div class="comment-header">
    <div class="comment-author">
      <span class="author-name">{{ comment.name || 'Anonymous' }}</span>
      @if (comment.pending) {
        <span class="pending-badge" title="Posting...">
          <svg class="spinner-mini" viewBox="0 0 24 24" width="12" height="12">
            <circle class="path" cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="25, 25" stroke-linecap="round"/>
          </svg>
          Posting...
        </span>
      }
      @if (isEdited(comment)) {
        <span class="edited-badge">(edited)</span>
      }
    </div>
    <div class="flex items-center gap-2">
      <span class="comment-time">{{ getRelativeTime(comment.createdAt) }}</span>
      @if (canDeleteComment()) {
        <button
          (click)="onDeleteComment()"
          [disabled]="isDeleting()"
          class="p-1 text-gray-400 hover:text-red-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
          title="Delete comment"
          aria-label="Delete comment"
        >
          @if (isDeleting()) {
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
          }
        </button>
      }
    </div>
  </div>

  <div class="comment-body">
    {{ comment.body }}
  </div>
</div>
