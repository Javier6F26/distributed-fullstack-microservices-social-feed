<div class="group/comment rounded-lg bg-white p-4 transition-colors hover:bg-gray-50" [class.opacity-75]="comment.pending">
  <div class="flex gap-3">
    <!-- Avatar -->
    <div class="flex-shrink-0">
      <div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-purple-600">
        <span class="text-sm font-bold text-white">
          {{ (comment.name || 'A').charAt(0).toUpperCase() }}
        </span>
      </div>
    </div>

    <!-- Comment Content -->
    <div class="min-w-0 flex-1">
      <!-- Header with author and actions -->
      <div class="mb-1.5 flex items-center justify-between gap-2">
        <div class="flex flex-wrap items-center gap-2">
          <span class="text-sm font-semibold text-gray-900">{{ comment.name || 'Anonymous' }}</span>
          <span class="text-xs text-gray-500">{{ relativeTime() }}</span>
          @if (isEdited(comment)) {
            <span class="text-xs text-gray-400">· (edited)</span>
          }
          @if (comment.pending) {
            <span class="inline-flex items-center gap-1 rounded-full bg-purple-100 px-2 py-0.5 text-xs font-medium text-purple-700" title="Posting...">
              <svg class="h-2.5 w-2.5 spinner-mini" viewBox="0 0 24 24" fill="none">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Posting...
            </span>
          }
        </div>
        
        @if (!isEditing() && canDeleteComment()) {
          <div class="flex items-center gap-1 opacity-0 transition-opacity group-hover/comment:opacity-100">
            <button
              (click)="onStartEdit()"
              class="rounded p-1 text-gray-400 transition-colors hover:bg-gray-200 hover:text-blue-600"
              title="Edit comment"
              aria-label="Edit comment"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
              </svg>
            </button>
            <button
              (click)="onDeleteComment()"
              [disabled]="isDeleting()"
              class="rounded p-1 text-gray-400 transition-colors hover:bg-red-100 hover:text-red-600 disabled:cursor-not-allowed disabled:opacity-50"
              title="Delete comment"
              aria-label="Delete comment"
            >
              @if (isDeleting()) {
                <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
              }
            </button>
          </div>
        }
      </div>

      <!-- Comment Body -->
      @if (isEditing()) {
        <div class="mt-2">
          <textarea
            [value]="editBody()"
            (input)="onEditBodyInput($event)"
            rows="3"
            class="w-full resize-none rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Edit your comment..."
          ></textarea>
          <div class="mt-2 flex gap-2">
            <button
              (click)="onSaveEdit()"
              class="rounded-lg bg-blue-600 px-3 py-1.5 text-sm font-medium text-white transition-colors hover:bg-blue-700"
            >
              Save
            </button>
            <button
              (click)="onCancelEdit()"
              class="rounded-lg bg-gray-200 px-3 py-1.5 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-300"
            >
              Cancel
            </button>
          </div>
        </div>
      } @else {
        <p class="text-sm text-gray-700 leading-relaxed break-words">
          {{ comment.body }}
        </p>
      }
    </div>
  </div>
</div>
