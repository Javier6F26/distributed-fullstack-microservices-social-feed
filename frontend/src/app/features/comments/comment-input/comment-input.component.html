<div class="comment-input-container">
  <form [formGroup]="commentForm" (ngSubmit)="onSubmit()">
    <!-- Comment Input - Authenticated User -->
    <div class="mb-4">
      <div class="flex gap-2">
        <textarea
          #commentTextarea
          formControlName="body"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none"
          placeholder="Add a comment..."
          rows="1"
          maxlength="1000"
          (input)="autoResize($event)"
          [disabled]="isSubmitting()"
        ></textarea>
        <button
          type="submit"
          class="px-4 py-2.5 bg-purple-600 text-white rounded-lg text-sm font-medium hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center min-w-[80px]"
          [disabled]="commentForm.invalid || isSubmitting()"
          aria-label="Post comment"
        >
          @if (isSubmitting()) {
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" width="16" height="16">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
            </svg>
            <span class="ml-2">Posting...</span>
          } @else {
            <span>Post</span>
          }
        </button>
      </div>

      <!-- Character Counter & Error -->
      <div class="flex justify-between items-center mt-2">
        @if (body?.invalid && body?.touched) {
          <div class="text-red-600 text-xs">
            @if (body?.errors?.['required']) {
              <span>Comment is required</span>
            }
            @if (body?.errors?.['maxlength']) {
              <span>Comment must not exceed 1000 characters</span>
            }
            @if (body?.errors?.['whitespace']) {
              <span>Comment cannot be only whitespace</span>
            }
          </div>
        } @else {
          <div></div>
        }
        <div class="text-gray-500 text-xs">{{ body?.value?.length || 0 }}/1000</div>
      </div>
    </div>
  </form>
</div>
