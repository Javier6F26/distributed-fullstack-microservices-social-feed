<div>
  <h2 class="text-2xl font-bold text-gray-900 text-center mb-2">Welcome Back</h2>
  <p class="text-gray-500 text-center text-sm mb-6">Sign in to continue to your account</p>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">
    <!-- Identifier Field (Email/Username) -->
    <div>
      <label for="identifier" class="block text-sm font-medium text-gray-700 mb-1">Email or Username</label>
      <input
        type="text"
        id="identifier"
        name="identifier"
        [(ngModel)]="identifier"
        (blur)="validateIdentifier()"
        placeholder="Enter your email or username"
        required
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all placeholder-gray-400"
        [class.border-red-500]="errors().identifier"
        [class.focus:ring-red-500]="errors().identifier"
      />
      @if (errors().identifier) {
        <span class="text-red-500 text-xs mt-1 block">{{ errors().identifier }}</span>
      }
    </div>

    <!-- Password Field -->
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          id="password"
          name="password"
          [(ngModel)]="password"
          (blur)="validatePassword()"
          placeholder="Enter your password"
          required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all placeholder-gray-400 pr-10"
          [class.border-red-500]="errors().password"
        />
        <button
          type="button"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
          (click)="showPassword.set(!showPassword())"
          tabindex="-1"
        >
          {{ showPassword() ? '👁️' : '👁️‍🗨️' }}
        </button>
      </div>
      @if (errors().password) {
        <span class="text-red-500 text-xs mt-1 block">{{ errors().password }}</span>
      }
    </div>

    <!-- Remember Me & Forgot Password -->
    <div class="flex items-center justify-between">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          name="rememberMe"
          [(ngModel)]="rememberMe"
          class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500"
        />
        <span class="text-sm text-gray-600">Remember me</span>
      </label>
      <button type="button" class="text-sm text-purple-600 hover:text-purple-700 font-medium" (click)="forgotPassword.emit()">
        Forgot password?
      </button>
    </div>

    <!-- General Error -->
    @if (errors().general) {
      <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm text-center">
        {{ errors().general }}
      </div>
    }

    <!-- Submit Button -->
    <button 
      type="submit" 
      [disabled]="isLoading()"
      class="w-full py-3 bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-semibold rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
    >
      @if (isLoading()) {
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Signing in...
      } @else {
        Sign In
      }
    </button>

    <!-- Switch to Register -->
    <p class="text-center text-sm text-gray-600">
      Don't have an account?
      <button type="button" class="text-purple-600 hover:text-purple-700 font-semibold" (click)="switchToRegister.emit()">
        Sign up
      </button>
    </p>
  </form>
</div>
