<nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo/Brand -->
      <div class="flex items-center">
        <h1 class="text-xl font-bold text-gray-900">Social Feed</h1>
      </div>

      <!-- Right side actions -->
      <div class="flex items-center space-x-4">
        <!-- Login button (shown when not authenticated) -->
        @if (!authService.isAuthenticated()) {
          <button
            (click)="openLoginModal()"
            class="px-4 py-2 bg-gradient-to-r from-purple-600 to-purple-700 text-white text-sm font-medium rounded-lg hover:from-purple-700 hover:to-purple-800 transition-all shadow-md hover:shadow-lg"
          >
            Login
          </button>
        }

        <!-- User profile (shown when authenticated) -->
        @if (authService.isAuthenticated()) {
          <div class="flex items-center space-x-3">
            <span class="text-sm text-gray-700 font-medium">
              {{ authService.user()?.username || 'User' }}
            </span>
            <button
              (click)="onLogout()"
              class="px-3 py-1.5 text-sm text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors"
              title="Logout"
            >
              Logout
            </button>
          </div>
        }

        <!-- Notifications (always shown) -->
        <button class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors" title="Notifications">
          <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>
