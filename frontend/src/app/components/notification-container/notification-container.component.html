<div class="fixed top-4 right-4 z-50 space-y-2">
  @for (notification of notifications(); track notification.id) {
    <div
      [ngClass]="getNotificationClasses(notification.type)"
      class="px-4 py-3 rounded-lg shadow-lg flex items-center justify-between min-w-[300px] animate-slide-in"
    >
      <span class="text-sm font-medium">{{ notification.message }}</span>
      <button
        (click)="dismiss(notification.id)"
        class="ml-4 text-white hover:text-gray-200 transition-colors"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  }
</div>
