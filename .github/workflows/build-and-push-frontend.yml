name: Build & Push Frontend

on:
  push:
    branches: [ main, prod, feature/test-pipeline ]
    paths:
      - "frontend/**"
      - "packages/**"
      - "shared-types/**"
      - "package*.json"
      - "nx.json"
      - ".github/workflows/build-and-push-frontend.yml"
  pull_request:
    types: [closed]
    branches: [ main, prod, feature/test-pipeline ]
    paths:
      - "frontend/**"
      - "packages/**"
      - "shared-types/**"
      - "package*.json"
      - "nx.json"
      - ".github/workflows/build-and-push-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write    # para cache type=gha
  packages: write   # para push a GHCR

jobs:
  frontend:
    # Ejecutar en push normales, o en pull_request cerrado sólo si fue mergeado
    if: github.event_name != 'pull_request' || (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Cache NPM (solo si haces lint/tests fuera de Docker)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push (Frontend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frontend:prod
            ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,ignore-error=true,compression=zstd,compression-level=3
