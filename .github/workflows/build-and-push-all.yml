name: Build & Push All Services

on:
  push:
    branches: [ main, prod, feature/test-pipeline ]
    paths:
      - "**"
      - ".github/workflows/build-and-push-all.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write    # para cache type=gha
  packages: write   # para push a GHCR

jobs:
  build-all:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [frontend, api-gateway, user-service, post-service, comment-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # Cache NPM
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache npm store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "REPO_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}:prod
            ghcr.io/${{ env.REPO_OWNER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,ignore-error=true,compression=zstd,compression-level=3
